syntax = "proto3";

package voxhub.v1;

option csharp_namespace = "VoxHubService.Grpc";

service ModelQueryService {
  rpc ListModels (ListModelsRequest) returns (ListModelsResponse);
}

message ListModelsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ModelDto {
  string id = 1;
  string name = 2;
}

message ListModelsResponse {
  repeated ModelDto models = 1;
  int32 total = 2;
}