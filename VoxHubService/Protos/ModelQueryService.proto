syntax = "proto3";

package voxhub.v1;

option csharp_namespace = "VoxHubService.Grpc";

service ModelQueryService {
  rpc ListModels (ListModelsRequest) returns (ListModelsResponse);
}

message ListModelsRequest {}

message ModelDto {
  string id = 1;
  string name = 2;
}

message ListModelsResponse {
  repeated ModelDto models = 1;
}